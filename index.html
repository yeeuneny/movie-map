<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Movie Archive Map</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Pretendard, Pretendard-Semibold, Pretendard-Bold;
            background: #f7f7f5;
            color: #1a1a1a;
            overflow: hidden;
        }

        #map-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background:
                linear-gradient(
                    rgba(0, 0, 0, 0.025) 1px,
                    transparent 1px
                ),
                linear-gradient(
                    90deg,
                    rgba(0, 0, 0, 0.025) 1px,
                    transparent 1px
                );

            background-size: 40px 40px;
        }

        .page-title {
            position: fixed;
            top: 24px;
            left: 28px;
            z-index: 100;
            pointer-events: none;
        }

        .page-title h1 {
            margin: 0;
            font-size: 22px;
            line-height: 1.2;
        }

        .page-title p {
            margin: 5px 0 0;
            font-size: 13px;
            color: #777;
        }

        .movie-label {
            position: absolute;
            transform: translate(-50%, -50%);
            padding: 4px 8px;

            /* 테두리 및 배경 제거 */
            border: none !important;
            background: transparent !important;

            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;

            cursor: pointer;
            user-select: none;

            transition: transform 0.18s ease;
        }

        .movie-label:hover {
            z-index: 20;
            transform: translate(-50%, -50%) scale(1.15);
            background: transparent !important;
            box-shadow: none !important;
        }

        .status-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            color: #777;
            font-size: 15px;
        }

        .error-message {
            color: #b42318;
        }

        #detail-panel {
            position: fixed;
            right: 24px;
            bottom: 24px;
            z-index: 200;

            width: min(340px, calc(100vw - 48px));
            padding: 22px;

            border: 1px solid #e5e5e5;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.14);

            opacity: 0;
            visibility: hidden;
            transform: translateY(14px);

            transition:
                opacity 0.2s ease,
                visibility 0.2s ease,
                transform 0.2s ease;
        }

        #detail-panel.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        #detail-panel h2 {
            margin: 0 0 14px;
            font-size: 20px;
        }

        #detail-panel dl {
            margin: 0;
        }

        #detail-panel div {
            display: grid;
            grid-template-columns: 72px 1fr;
            gap: 10px;
            margin-top: 9px;
        }

        #detail-panel dt {
            color: #888;
            font-size: 13px;
        }

        #detail-panel dd {
            margin: 0;
            font-size: 14px;
        }


        .comments-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #ececec;
        }

        .comments-section h3 {
            margin: 0 0 10px;
            font-size: 15px;
        }

        #comment-form {
            display: grid;
            gap: 8px;
        }

        #comment-input {
            width: 100%;
            min-height: 76px;
            padding: 10px 12px;
            border: 1px solid #d8d8d8;
            border-radius: 10px;
            resize: vertical;
            font: inherit;
            font-size: 14px;
            line-height: 1.5;
            outline: none;
        }

        #comment-input:focus {
            border-color: #999;
        }

        #comment-submit {
            justify-self: end;
            padding: 8px 13px;
            border: 0;
            border-radius: 9px;
            background: #1a1a1a;
            color: #fff;
            font: inherit;
            font-size: 13px;
            cursor: pointer;
        }

        #comment-submit:hover {
            opacity: 0.86;
        }

        #comment-list {
            display: grid;
            gap: 8px;
            max-height: 180px;
            margin: 14px 0 0;
            padding: 0;
            overflow-y: auto;
            list-style: none;
        }

        .comment-item {
            padding: 10px 12px;
            border-radius: 10px;
            background: #f5f5f3;
        }

        .comment-text {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 13px;
            line-height: 1.45;
        }

        .comment-meta {
            margin-top: 6px;
            color: #999;
            font-size: 11px;
        }

        .comment-empty {
            color: #999;
            font-size: 13px;
        }

        #close-panel {
            position: absolute;
            top: 12px;
            right: 14px;

            border: 0;
            background: transparent;
            color: #777;
            font-size: 20px;
            cursor: pointer;
        }

        /* 모바일 화면 대응 시작 */

        #map-container {
            height: 100vh;
            height: 100dvh;
        }

        #detail-panel {
            max-height: calc(100dvh - 48px);
            overflow-y: auto;
            overscroll-behavior: contain;
        }

        .movie-label {
            max-width: calc(100vw - 24px);
        }

        @media (max-width: 600px) {
            .page-title {
                top: 18px;
                left: 18px;
            }

            .page-title h1 {
                font-size: 19px;
            }

            .page-title p {
                font-size: 12px;
            }

            .movie-label {
                min-height: 44px;
                padding: 10px 7px;
                font-size: 13px;

                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            #detail-panel {
                left: 12px;
                right: 12px;
                bottom: max(12px, env(safe-area-inset-bottom));

                width: auto;
                max-height: calc(100dvh - 24px);
                padding: 20px 18px;
                padding-bottom: max(
                    20px,
                    env(safe-area-inset-bottom)
                );

                overflow-y: auto;
                border-radius: 18px;
            }

            #detail-panel h2 {
                padding-right: 24px;
                font-size: 18px;
            }

            #detail-panel div {
                grid-template-columns: 64px minmax(0, 1fr);
                gap: 8px;
            }

            #comment-input {
                font-size: 16px;
            }

            #comment-submit {
                min-height: 42px;
                padding: 10px 16px;
            }

            #comment-list {
                max-height: none;
            }

            #close-panel {
                width: 40px;
                height: 40px;
                top: 6px;
                right: 6px;
            }
        }

        @media (max-height: 500px)
            and (orientation: landscape) {

            .page-title {
                top: 10px;
                left: 14px;
            }

            .page-title h1 {
                font-size: 17px;
            }

            .page-title p {
                display: none;
            }

            #detail-panel {
                top: 8px;
                bottom: 8px;
                max-height: none;
            }
        }

        /* 모바일 화면 대응 끝 */
        
        #map-content {
            position: absolute;
            inset: 0;
            transform-origin: center center;
            transition: transform 0.12s ease-out;
        }

        #zoom-controls {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 300;

            display: flex;
            align-items: center;
            gap: 8px;

            padding: 9px 10px;
            border: 1px solid #e5e5e5;
            border-radius: 12px;

            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(8px);
        }

        #zoom-controls button {
            width: 32px;
            height: 32px;

            padding: 0;
            border: 1px solid #dddddd;
            border-radius: 8px;

            background: #ffffff;
            color: #333333;

            font: inherit;
            font-size: 18px;
            line-height: 1;

            cursor: pointer;
        }

        #zoom-controls button:hover {
            background: #f2f2f2;
        }

        #zoom-range {
            width: 120px;
            cursor: pointer;
        }

        #zoom-value {
            min-width: 42px;
            color: #555555;
            font-size: 12px;
            text-align: center;
        }

        @media (max-width: 600px) {
            #zoom-controls {
                left: 12px;
                bottom: max(12px, env(safe-area-inset-bottom));
                gap: 5px;
                padding: 7px;
            }

            #zoom-controls button {
                width: 36px;
                height: 36px;
            }

            #zoom-range {
                width: 80px;
            }

            #zoom-value {
                min-width: 38px;
            }
        }

    </style>
</head>

<body>
    <header class="page-title">
        <h1>What's in My Archive?</h1>
        <p>20 Films I've collected</p>
    </header>

    <main id="map-container">
        <div id="map-content">
            <p class="status-message">
                영화 데이터를 불러오는 중입니다.
            </p>
        </div>
    </main>

    <div id="zoom-controls" aria-label="화면 확대 및 축소">
        <button id="zoom-out" type="button" aria-label="축소">
            −
        </button>

        <input
            id="zoom-range"
            type="range"
            min="0.5"
            max="4"
            step="0.1"
            value="1"
            aria-label="확대 배율"
        >

        <span id="zoom-value">1.0×</span>

        <button id="zoom-in" type="button" aria-label="확대">
            +
        </button>

        <button id="zoom-reset" type="button" aria-label="확대 초기화">
            ↺
        </button>
    </div>

    <aside id="detail-panel">
        <button id="close-panel" type="button" aria-label="닫기">
            ×
        </button>

        <h2 id="detail-title"></h2>

        <dl>
            <div>
                <dt>유형</dt>
                <dd id="detail-type"></dd>
            </div>

            <div>
                <dt>장르</dt>
                <dd id="detail-genres"></dd>
            </div>

            <div>
                <dt>감독</dt>
                <dd id="detail-director"></dd>
            </div>

            <div>
                <dt>개봉연도</dt>
                <dd id="detail-year"></dd>
            </div>

            <div>
                <dt>평점</dt>
                <dd id="detail-rating"></dd>
            </div>
        </dl>


        <section class="comments-section" aria-labelledby="comments-heading">
            <h3 id="comments-heading">익명 댓글</h3>

            <form id="comment-form">
                <textarea
                    id="comment-input"
                    maxlength="300"
                    placeholder="이 영화에 대한 댓글을 남겨주세요."
                    aria-label="익명 댓글 입력"
                    required
                ></textarea>

                <button id="comment-submit" type="submit">
                    댓글 등록
                </button>
            </form>

            <ul id="comment-list" aria-live="polite"></ul>
        </section>
    </aside>

    <script>
        const CSV_URL = "./movies.csv";

        const container = document.getElementById("map-content");
        const detailPanel = document.getElementById("detail-panel");

        const mapContent = document.getElementById("map-content");

        const zoomOutButton = document.getElementById("zoom-out");
        const zoomInButton = document.getElementById("zoom-in");
        const zoomResetButton = document.getElementById("zoom-reset");
        const zoomRange = document.getElementById("zoom-range");
        const zoomValue = document.getElementById("zoom-value");

        const MIN_ZOOM = 0.5;
        const MAX_ZOOM = 4;
        const ZOOM_STEP = 0.1;

        let currentZoom = 1;

        const detailTitle = document.getElementById("detail-title");
        const detailType = document.getElementById("detail-type");
        const detailGenres = document.getElementById("detail-genres");
        const detailDirector = document.getElementById("detail-director");
        const detailYear = document.getElementById("detail-year");
        const detailRating = document.getElementById("detail-rating");

        const closePanelButton =
            document.getElementById("close-panel");

        const commentForm = document.getElementById("comment-form");
        const commentInput = document.getElementById("comment-input");
        const commentList = document.getElementById("comment-list");

        let currentMovieTitle = "";

        async function init() {
            try {
                const response = await fetch(CSV_URL);

                if (!response.ok) {
                    throw new Error(
                        `CSV 불러오기 실패: ${response.status}`
                    );
                }

                const csvText = await response.text();

                Papa.parse(csvText, {
                    header: true,
                    dynamicTyping: true,
                    skipEmptyLines: true,

                    complete: (results) => {
                        console.log("CSV 데이터:", results.data);
                        console.log("CSV 파싱 오류:", results.errors);

                        const movies = results.data
                            .map(normalizeMovie)
                            .filter(movie => movie.title);

                        if (movies.length === 0) {
                            showError(
                                "CSV에서 영화 데이터를 찾지 못했습니다."
                            );
                            return;
                        }

                        const moviesWithCoordinates =
                            assignRandomCoordinates(movies);

                        renderMovies(moviesWithCoordinates);
                    },

                    error: (error) => {
                        showError(
                            `CSV 분석 실패: ${error.message}`
                        );
                    }
                });
            } catch (error) {
                console.error(error);
                showError(error.message);
            }
        }

        function normalizeMovie(row) {
            return {
                title: String(row.Title ?? "").trim(),
                type: String(row.Type ?? "").trim(),

                genres: String(row.Genres ?? "")
                    .split(",")
                    .map(value => value.trim())
                    .filter(Boolean),

                directors: String(row.Director ?? "")
                    .split(",")
                    .map(value => value.trim())
                    .filter(Boolean),

                year: Number(row.Year),
                rating: Number(row.Rating)
            };
        }

        function assignRandomCoordinates(movies) {
            const count = movies.length;
            // 격자 크기 결정 (개수에 따라 자동으로 변함)
            const cols = Math.ceil(Math.sqrt(count));
            const rows = Math.ceil(count / cols);

            return movies.map((movie, index) => {
                const col = index % cols;
                const row = Math.floor(index / cols);

                // 전체 화면에서 격자 칸의 너비/높이 계산 (여백 10% 확보)
                const cellWidth = 80 / cols;
                const cellHeight = 80 / rows;

                // 각 격자 내부에서의 랜덤 오프셋
                const randomX = Math.random() * (cellWidth * 0.6);
                const randomY = Math.random() * (cellHeight * 0.6);

                return {
                    ...movie,
                    x: 10 + (col * cellWidth) + (cellWidth * 0.2) + randomX,
                    y: 10 + (row * cellHeight) + (cellHeight * 0.2) + randomY
                };
            });
        }

        function renderMovies(movies) {
            container.innerHTML = "";

            movies.forEach(movie => {
                const label =
                    document.createElement("button");

                label.type = "button";
                label.className = "movie-label";
                label.textContent = movie.title;

                label.style.left = `${movie.x}%`;
                label.style.top = `${movie.y}%`;

                /*
                 * 현재는 임시 랜덤 좌표를 색조 계산에도 사용합니다.
                 * 나중에 PCA 좌표로 교체하면 가까운 영화가
                 * 비슷한 색조를 갖게 됩니다.
                 */
                const hue =
                    (movie.x * 2.5 + movie.y * 1.4) % 360;

                /*
                 * 현재 데이터는 5점 만점입니다.
                 * 평점 0~5를 채도 25%~100%로 변환합니다.
                 */
                const safeRating = Number.isFinite(movie.rating)
                    ? Math.min(5, Math.max(0, movie.rating))
                    : 0;

                const saturation =
                    25 + (safeRating / 5) * 75;

                label.style.color =
                    `hsl(${hue}, ${saturation}%, 38%)`;

                label.addEventListener("click", () => {
                    openDetailPanel(movie);
                });

                container.appendChild(label);
            });
        }

        function openDetailPanel(movie) {
            currentMovieTitle = movie.title;
            detailTitle.textContent = movie.title;

            detailType.textContent =
                movie.type || "정보 없음";

            detailGenres.textContent =
                movie.genres.join(", ") || "정보 없음";

            detailDirector.textContent =
                movie.directors.join(", ") || "정보 없음";

            detailYear.textContent =
                Number.isFinite(movie.year)
                    ? movie.year
                    : "정보 없음";

            detailRating.textContent =
                Number.isFinite(movie.rating)
                    ? `${movie.rating} / 5`
                    : "정보 없음";

            renderComments(currentMovieTitle);
            commentInput.value = "";
            detailPanel.classList.add("open");
        }


        function getCommentStorageKey(movieTitle) {
            return `movie-comments:${movieTitle}`;
        }

        function loadComments(movieTitle) {
            try {
                const saved = localStorage.getItem(
                    getCommentStorageKey(movieTitle)
                );

                return saved ? JSON.parse(saved) : [];
            } catch (error) {
                console.error("댓글 불러오기 실패:", error);
                return [];
            }
        }

        function saveComments(movieTitle, comments) {
            localStorage.setItem(
                getCommentStorageKey(movieTitle),
                JSON.stringify(comments)
            );
        }

        function renderComments(movieTitle) {
            const comments = loadComments(movieTitle);
            commentList.innerHTML = "";

            if (comments.length === 0) {
                const emptyMessage = document.createElement("li");
                emptyMessage.className = "comment-empty";
                emptyMessage.textContent = "아직 등록된 댓글이 없습니다.";
                commentList.appendChild(emptyMessage);
                return;
            }

            comments
                .slice()
                .reverse()
                .forEach(comment => {
                    const item = document.createElement("li");
                    item.className = "comment-item";

                    const body = document.createElement("p");
                    body.className = "comment-text";
                    body.textContent = comment.text;

                    const meta = document.createElement("div");
                    meta.className = "comment-meta";
                    meta.textContent =
                        `익명 · ${new Date(comment.createdAt).toLocaleString("ko-KR")}`;

                    item.append(body, meta);
                    commentList.appendChild(item);
                });
        }

        commentForm.addEventListener("submit", event => {
            event.preventDefault();

            const commentText = commentInput.value.trim();

            if (!currentMovieTitle || !commentText) {
                return;
            }

            const comments = loadComments(currentMovieTitle);

            comments.push({
                text: commentText,
                createdAt: new Date().toISOString()
            });

            saveComments(currentMovieTitle, comments);
            commentInput.value = "";
            renderComments(currentMovieTitle);
            commentInput.focus();
        });

        function clampZoom(value) {
            return Math.min(
                MAX_ZOOM,
                Math.max(MIN_ZOOM, value)
            );
        }

        function setZoom(value) {
            currentZoom = clampZoom(Number(value));

            mapContent.style.transform =
                `scale(${currentZoom})`;

            zoomRange.value = currentZoom.toFixed(1);
            zoomValue.textContent =
                `${currentZoom.toFixed(1)}×`;
        }

        zoomOutButton.addEventListener("click", () => {
            setZoom(currentZoom - ZOOM_STEP);
        });

        zoomInButton.addEventListener("click", () => {
            setZoom(currentZoom + ZOOM_STEP);
        });

        zoomResetButton.addEventListener("click", () => {
            setZoom(1);
        });

        zoomRange.addEventListener("input", event => {
            setZoom(event.target.value);
        });

        document.addEventListener("wheel", event => {
            if (!event.ctrlKey) {
                return;
            }

            event.preventDefault();

            const direction = event.deltaY < 0
                ? ZOOM_STEP
                : -ZOOM_STEP;

            setZoom(currentZoom + direction);
        }, {
            passive: false
        });

        function closeDetailPanel() {
            detailPanel.classList.remove("open");
        }

        function showError(message) {
            container.innerHTML = `
                <p class="status-message error-message">
                    ${message}
                </p>
            `;
        }

        closePanelButton.addEventListener(
            "click",
            closeDetailPanel
        );

        document.addEventListener("keydown", event => {
            if (event.key === "Escape") {
                closeDetailPanel();
            }
        });

        init();
    </script>
</body>
</html>
